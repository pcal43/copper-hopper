        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }

        maven {
            name = 'spongepowered'
            url = 'https://repo.spongepowered.org/maven/'
        }
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'copperhopper'
include 'common'
